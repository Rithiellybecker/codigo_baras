<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de Código</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #reader {
      margin: 20px auto;
      width: 300px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #1e293b;
      margin: 5px;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>📷 Escaneie o Código</h1>

<div id="reader"></div>

<p id="output">Aguardando código...</p>

<h3>📋 Histórico</h3>
<ul id="historico"></ul>

<script>
const output = document.getElementById("output");
const historicoEl = document.getElementById("historico");

let historico = JSON.parse(localStorage.getItem("historicoCodigos")) || [];

function atualizarHistorico() {
  historicoEl.innerHTML = "";
  historico.slice().reverse().forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.codigo + " - " + item.data;
    historicoEl.appendChild(li);
  });
}

function onScanSuccess(decodedText) {
  output.innerText = decodedText;

  historico.push({
    codigo: decodedText,
    data: new Date().toLocaleString()
  });

  localStorage.setItem("historicoCodigos", JSON.stringify(historico));
  atualizarHistorico();
}

atualizarHistorico();

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
